  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#fff;color:#2a2a2a;font-family:'DM Sans',sans-serif;overflow:hidden}
  #header{position:fixed;top:0;left:0;z-index:100;display:flex;align-items:baseline;gap:14px;padding:10px 18px;background:rgba(255,255,255,.94);backdrop-filter:blur(6px);border-bottom:1px solid #eee}
  #header h1{font-family:'Playfair Display',serif;font-size:18px;color:#14491a}
  #header .sub{font-size:10px;color:#aaa}
  #toolbar{position:fixed;top:0;right:0;z-index:100;display:flex;align-items:center;gap:2px;padding:7px 10px;background:rgba(255,255,255,.94);backdrop-filter:blur(6px)}
  .tb{background:none;border:1px solid #ddd;color:#666;padding:3px 9px;border-radius:3px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:10px;transition:all .15s}
  .tb:hover{background:#f5f5f5;color:#222}
  .tb.active{background:#1a5a20;color:#fff;border-color:#1a5a20}
  .tb-sep{width:1px;height:14px;background:#e0e0e0;margin:0 3px}
  #stats-box{position:fixed;top:44px;right:10px;z-index:100;background:rgba(255,255,255,.94);backdrop-filter:blur(6px);border:1px solid #eee;border-radius:5px;padding:8px 12px;font-size:10px;color:#999;line-height:1.7}
  .stat-val{color:#444;font-weight:600}
  .stat-row{cursor:pointer;border-radius:3px;padding:1px 4px;margin:-1px -4px;transition:background .1s}
  .stat-row:hover{background:#f5f5f5}
  .stat-row.active{background:#f0f0f0}
  .stat-dot{display:inline-block;width:7px;height:7px;border-radius:1.5px;margin-right:3px;vertical-align:middle}
  #tree-container{width:100vw;height:100vh;cursor:grab}
  #tree-container:active{cursor:grabbing}
  #tree-container svg{will-change:transform}
  #tree-container svg g{will-change:transform}
  .link{fill:none;stroke-width:1.1}
  .link-dashed{stroke-dasharray:3,3;opacity:.3}
  .node-group{cursor:pointer}
  .node-box{rx:3;ry:3;stroke-width:1.4}
  .node-group:hover .node-box{filter:brightness(.92)}
  .node-group.dimmed{opacity:.15}
  .n-name{font-family:'DM Sans',sans-serif;font-weight:600;fill:#1a1a1a;pointer-events:none}
  .n-detail{font-family:'DM Sans',sans-serif;font-weight:400;fill:#888;pointer-events:none}
  .n-expand{font-family:'DM Sans',sans-serif;font-size:9px;fill:#ccc;pointer-events:none}

  .tt-row{margin-top:2px}
  .tt-label{color:#aaa}
  #timeline{position:fixed;bottom:0;left:0;right:0;z-index:90;height:32px;background:rgba(255,255,255,.94);backdrop-filter:blur(6px);border-top:1px solid #eee}

  .legend-swatch{width:14px;height:8px;border-radius:1.5px}
  #eigen-link{position:fixed;bottom:36px;right:14px;z-index:100;display:flex;align-items:center;gap:5px;background:none;border:1px solid #ddd;border-radius:3px;padding:3px 9px;font-size:10px;color:#666;text-decoration:none;transition:all .15s;font-family:'DM Sans',sans-serif}

  #eigen-link .eigen-label{font-weight:600}
  #eigen-link .eigen-sub{color:#aaa;font-size:9px}

  .n-name-radial, .n-detail-radial {

  }
  .n-name-radial { font-weight:600; fill:#1a1a1a; }
  .n-detail-radial { font-weight:400; fill:#999; }
  
  /* Radial ring labels */
  .ring-label { font-family:'DM Sans',sans-serif; font-size:8px; fill:#ddd; }

  /* Dark mode toggle */
  #dark-toggle{background:none;border:1px solid #ddd;color:#666;padding:3px 9px;border-radius:3px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:10px;transition:all .15s}

let isDark=false;
function bgFill(){return isDark?"#1a1a1a":"#fff";}
function nameFill(){return isDark?"#ddd":"#1a1a1a";}
function detailFill(){return isDark?"#888":"#888";}
function ringStroke(){return isDark?"#333":"#e0e0e0";}
function ringLabelFill(){return isDark?"#444":"#ddd";}
function toggleDark(){
  isDark=!isDark;
  document.body.classList.toggle("dark",isDark);
  const src=isDark?R_DARK:R_LIGHT;
  Object.keys(src).forEach(k=>{R[k].fill=src[k].fill;R[k].stroke=src[k].stroke;R[k].link=src[k].link;});
  document.getElementById("dark-toggle").textContent=isDark?"\u2600\uFE0F":"\uD83C\uDF19";
  update();
}
function region(d){if(d.depth===0)return"root";if(d.data.is1912)return"p1912";if(d.data.isAus)return"aus";return"irish";}

let layout="r",activeFilter=null;
const BOX_W=134,BOX_H=36;
const container=document.getElementById("tree-container");
const tooltip=document.getElementById("tooltip");
let W=window.innerWidth,H=window.innerHeight;
const svg=d3.select(container).append("svg").attr("width",W).attr("height",H)
  .attr("text-rendering","optimizeSpeed").attr("shape-rendering","auto");
const g=svg.append("g");
let _rafId=null;
const zoomB=d3.zoom().scaleExtent([0.02,4]).on("zoom",e=>{
  if(_rafId)cancelAnimationFrame(_rafId);
  _rafId=requestAnimationFrame(()=>g.attr("transform",e.transform));
});
svg.call(zoomB);

document.addEventListener("keydown",e=>{
  if(!e.ctrlKey&&!e.metaKey)return;
  if(e.key==="="||e.key==="+"){e.preventDefault();svg.transition().duration(200).call(zoomB.scaleBy,1.3);}
  else if(e.key==="-"){e.preventDefault();svg.transition().duration(200).call(zoomB.scaleBy,.7);}
  else if(e.key==="0"){e.preventDefault();resetView();}
});
window.addEventListener("resize",()=>{W=window.innerWidth;H=window.innerHeight;svg.attr("width",W).attr("height",H);});

const root=d3.hierarchy(DATA,d=>d.children);
root.descendants().forEach(d=>{if(d.depth>3&&d.children){d._children=d.children;d.children=null;}});

function detailText(d){
  const p=[];
  if(d.data.role)p.push(d.data.role==="sire"?"♂ Sire":"♀ Dam");
  if(d.data.colour)p.push(CM[d.data.colour]||d.data.colour);
  if(d.data.whelpDate&&!d.data.is1912){const pp=d.data.whelpDate.split("/");if(pp.length===3)p.push(pp[2]);}
  if(d.data.is1912)p.push("no records");
  return p.join(" · ");
}

function showTooltip(e,d){
  let h=`<div class="tt-name">${d.data.name}</div>`;
  if(d.data.isAus)h+=`<div style="color:#b8860b;font-weight:600">🦘 Australian bloodline</div>`;
  if(d.data.is1912)h+=`<div style="color:#999;font-style:italic">No records available</div>`;
  if(d.data.whelpDate&&!d.data.is1912)h+=`<div class="tt-row"><span class="tt-label">Whelped:</span> ${d.data.whelpDate}</div>`;
  if(d.data.sex)h+=`<div class="tt-row"><span class="tt-label">Sex:</span> ${d.data.sex==="D"?"♂ Dog":"♀ Bitch"}</div>`;
  if(d.data.colour)h+=`<div class="tt-row"><span class="tt-label">Colour:</span> ${CM[d.data.colour]||d.data.colour} (${d.data.colour})</div>`;
  if(d.data.breeder)h+=`<div class="tt-row"><span class="tt-label">Breeder:</span> ${d.data.breeder}</div>`;
  if(d.data.role)h+=`<div class="tt-row"><span class="tt-label">Role:</span> ${d.data.role==="sire"?"♂ Sire":"♀ Dam"}</div>`;
  const kids=d.children||d._children;
  if(kids)h+=`<div class="tt-row" style="margin-top:4px;color:#bbb;font-size:10px">Click to ${d.children?"collapse":"expand"}</div>`;
  tooltip.innerHTML=h;tooltip.style.opacity=1;
  tooltip.style.left=(e.clientX+12)+"px";tooltip.style.top=(e.clientY-8)+"px";
}

function toggleNode(e,d){
  if(d.children){d._children=d.children;d.children=null;}
  else if(d._children){d.children=d._children;d._children=null;}
  update();
}

function filterTo(type){
  if(activeFilter===type)activeFilter=null;else activeFilter=type;
  document.querySelectorAll(".stat-row").forEach(el=>el.classList.remove("active"));
  if(activeFilter)document.querySelector(`.stat-row[data-type="${activeFilter}"]`)?.classList.add("active");
  
  g.selectAll(".node-group").classed("dimmed",d=>activeFilter?region(d)!==activeFilter&&region(d)!=="root":false);
  g.selectAll(".link").attr("opacity",function(){return activeFilter?0.12:this.classList.contains("link-dashed")?0.3:0.55;});
  
  if(activeFilter==="aus"){
    // Zoom to Aus cluster
    let minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;
    g.selectAll(".node-group").each(function(d){
      if(!d.data.isAus)return;
      const t=this.getAttribute("transform");
      const m=t.match(/translate\(\s*([^,\s]+)[,\s]+([^)\s]+)/);
      if(m){const nx=+m[1],ny=+m[2];minX=Math.min(minX,nx);maxX=Math.max(maxX,nx+BOX_W);minY=Math.min(minY,ny);maxY=Math.max(maxY,BOX_H+ny);}
    });
    if(minX<Infinity){
      const bw=maxX-minX+200,bh=maxY-minY+200,s=Math.min(W/bw,H/bh,1.5);
      svg.transition().duration(600).call(zoomB.transform,d3.zoomIdentity.translate(W/2-(minX+maxX)/2*s,H/2-(minY+maxY)/2*s).scale(s));
    }
  } else if(!activeFilter) resetView();
  updateTimeline();
}

function updateStats(){
  const vis=root.descendants();
  const total=vis.length;
  const aus=vis.filter(d=>d.data.isAus).length;
  const irish=vis.filter(d=>!d.data.isAus&&!d.data.is1912&&d.depth>0).length;
  const p1912=vis.filter(d=>d.data.is1912).length;
  const maxGen=d3.max(vis,d=>d.depth);
  let oldest=null,newest=null;
  vis.forEach(d=>{
    if(!d.data.whelpDate||d.data.is1912)return;
    const pp=d.data.whelpDate.split("/");if(pp.length!==3)return;
    const y=+pp[2];if(!oldest||y<oldest.y)oldest={y,name:d.data.name};if(!newest||y>newest.y)newest={y,name:d.data.name};
  });
  document.getElementById("stats-box").innerHTML=
    `<div class="stat-row" data-type="irish" onclick="filterTo('irish')"><span class="stat-dot" style="background:#3a8a30"></span>Irish <span class="stat-val">${irish}</span></div>`+
    `<div class="stat-row" data-type="aus" onclick="filterTo('aus')"><span class="stat-dot" style="background:#c08a10"></span>Australian <span class="stat-val">${aus}</span> <span style="color:#ccc">← click</span></div>`+
    `<div class="stat-row" data-type="p1912" onclick="filterTo('p1912')"><span class="stat-dot" style="background:#bbb"></span>No records <span class="stat-val">${p1912}</span></div>`+
    `<div style="border-top:1px solid #f0f0f0;margin:4px 0;padding-top:4px">`+
    `Visible: <span class="stat-val">${total}</span> · Gens: <span class="stat-val">${maxGen}</span><br>`+
    (oldest?`<span style="color:#ccc">${oldest.y} → ${newest?newest.y:""}</span>`:"")+`</div>`;
  if(activeFilter)document.querySelector(`.stat-row[data-type="${activeFilter}"]`)?.classList.add("active");
}

function updateTimeline(){
  const vis=root.descendants(),dates=[];
  vis.forEach(d=>{if(!d.data.whelpDate||d.data.is1912)return;const pp=d.data.whelpDate.split("/");if(pp.length===3)dates.push({year:+pp[2],isAus:d.data.isAus});});
  if(!dates.length)return;
  const minY=d3.min(dates,d=>d.year),maxY=d3.max(dates,d=>d.year);
  const pad=60,tw=W-pad*2;
  const ts=d3.select("#timeline-svg");ts.selectAll("*").remove();
  const x=d3.scaleLinear().domain([minY,maxY]).range([pad,pad+tw]);
  for(let yr=Math.floor(minY/10)*10;yr<=Math.ceil(maxY/10)*10;yr+=10){
    if(yr<minY-5||yr>maxY+5)continue;
    ts.append("line").attr("x1",x(yr)).attr("x2",x(yr)).attr("y1",4).attr("y2",24).attr("stroke",isDark?"#333":"#eee");
    ts.append("text").attr("x",x(yr)).attr("y",28).attr("text-anchor","middle").attr("font-family","DM Sans").attr("font-size",8).attr("fill",isDark?"#555":"#ccc").text(yr);
  }
  ts.append("line").attr("x1",pad).attr("x2",pad+tw).attr("y1",16).attr("y2",16).attr("stroke",isDark?"#333":"#e8e8e8");
  dates.forEach(d=>{
    const col=d.isAus?R.aus.stroke:R.irish.stroke;
    const dim=activeFilter&&((activeFilter==="aus"&&!d.isAus)||(activeFilter==="irish"&&d.isAus));
    ts.append("circle").attr("cx",x(d.year)).attr("cy",16).attr("r",2.5).attr("fill",col).attr("opacity",dim?.1:.7);
  });
  ts.append("circle").attr("cx",x(2020)).attr("cy",16).attr("r",4).attr("fill",R.root.stroke).attr("stroke",bgFill()).attr("stroke-width",1.5);
}

// ============ RENDER FUNCTIONS PER LAYOUT ============

function renderTree(){
  const maxD=d3.max(root.descendants(),d=>d.depth)||1;
  const nodeH=layout==="v"?BOX_W+16:BOX_H+5;
  const nodeW=layout==="v"?BOX_H+36:BOX_W+44;
  const treemap=d3.tree().nodeSize([nodeH,nodeW]);
  treemap(root);
  const nodes=root.descendants(),links=root.links();
  if(layout==="h")nodes.forEach(d=>{const t=d.x;d.x=d.y;d.y=t;});

  // Tier logic: 0-5 = full box, 6 = name-only box, 7+ = bare text
  const NAME_ONLY_D=6;
  const TEXT_ONLY_D=7;
  function tier(d){if(d.depth>=TEXT_ONLY_D)return"text";if(d.depth>=NAME_ONLY_D)return"nameonly";return"full";}

  // Links — offset target x for text-only nodes so lines don't overlap names
  const linkPath=layout==="h"
    ?d=>{
      const sx=d.source.x+BOX_W, sy=d.source.y+BOX_H/2;
      const isText=tier(d.target)==="text";
      const tx=d.target.x-(isText?2:0), ty=d.target.y+(isText?6:BOX_H/2);
      const mx=(sx+tx)/2;
      return`M${sx},${sy}C${mx},${sy} ${mx},${ty} ${tx},${ty}`;
    }
    :d=>{
      const sx=d.source.x+BOX_W/2, sy=d.source.y+BOX_H;
      const isText=tier(d.target)==="text";
      const tx=d.target.x+(isText?20:BOX_W/2), ty=d.target.y-(isText?4:0);
      const my=(sy+ty)/2;
      return`M${sx},${sy}C${sx},${my} ${tx},${my} ${tx},${ty}`;
    };

  const link=g.selectAll(".link").data(links,d=>d.target.data.name+d.target.depth);
  link.enter().append("path").merge(link)
    .attr("d",linkPath).attr("stroke",d=>R[region(d.target)].link)
    .attr("class",d=>d.target.data.is1912?"link link-dashed":"link")
    .attr("opacity",d=>d.target.data.is1912?.3:.55);
  link.exit().remove();

  g.selectAll(".node-group").remove();
  const ne=g.selectAll(".node-group").data(nodes).enter().append("g").attr("class","node-group")
    .attr("transform",d=>`translate(${d.x},${d.y})`)
    .on("click",toggleNode)
    .on("mouseenter",showTooltip)
    .on("mousemove",e=>{tooltip.style.left=(e.clientX+12)+"px";tooltip.style.top=(e.clientY-8)+"px";})
    .on("mouseleave",()=>tooltip.style.opacity=0);

  // === TIER 3: Text-only (gen 7+) ===
  ne.filter(d=>tier(d)==="text").each(function(d){
    const el=d3.select(this);
    const fs=d.depth>=maxD?6:7;
    const col=d.data.is1912?"#ccc":d.data.isAus?R.aus.stroke:R.irish.stroke;
    const maxC=Math.max(4,Math.floor((BOX_W-12)/(fs*0.72)));
    const n=d.data.name;
    const display=n.length>maxC?n.substring(0,maxC-1)+"…":n;
    const tw=display.length*fs*0.62+8;
    // White pill behind text to mask link lines
    el.append("rect").attr("x",2).attr("y",1).attr("width",tw).attr("height",fs+5)
      .attr("fill",bgFill()).attr("rx",2).attr("opacity",.92);
    el.append("text").attr("x",6).attr("y",10)
      .attr("font-family","DM Sans").attr("font-weight","500")
      .attr("font-size",fs+"px").attr("fill",col)
      .text(display);
    if(d._children){
      el.append("text").attr("class","n-expand").attr("x",tw+4).attr("y",10)
        .attr("font-size","7px").text(layout==="h"?"▸":"▾");
    }
  });

  // === TIER 2: Name-only box (gen 6) ===
  const nameOnly=ne.filter(d=>tier(d)==="nameonly");
  const NO_H=16;
  nameOnly.append("rect").attr("width",BOX_W+4).attr("height",NO_H+4)
    .attr("x",-2).attr("y",-2).attr("fill",bgFill()).attr("rx",4).attr("opacity",.95);
  nameOnly.append("rect").attr("class","node-box").attr("width",BOX_W).attr("height",NO_H)
    .attr("fill",d=>R[region(d)].fill).attr("stroke",d=>R[region(d)].stroke);
  nameOnly.append("text").attr("class","n-name").attr("x",5).attr("y",11)
    .style("font-size","5.5px")
    .text(d=>{const p=d.data.isAus?"🦘 ":d.data.is1912?"":"🍀 ";const n=d.data.name;const m=24-p.length;return p+(n.length>m?n.substring(0,m-1)+"…":n);});
  nameOnly.filter(d=>d._children).append("text").attr("class","n-expand")
    .attr("x",BOX_W-10).attr("y",11).style("font-size","5.5px").text(layout==="h"?"▸":"▾");

  // === TIER 1: Full box (gen 0-5) ===
  const full=ne.filter(d=>tier(d)==="full");
  full.append("rect").attr("width",BOX_W+4).attr("height",BOX_H+4)
    .attr("x",-2).attr("y",-2).attr("fill",bgFill()).attr("rx",4).attr("opacity",.95);
  full.append("rect").attr("class","node-box").attr("width",BOX_W).attr("height",BOX_H)
    .attr("fill",d=>R[region(d)].fill).attr("stroke",d=>R[region(d)].stroke);
  full.append("text").attr("class","n-name").attr("x",6).attr("y",14)
    .style("font-size","10px")
    .text(d=>{const p=d.data.isAus?"🦘 ":d.data.is1912?"":"🍀 ";const n=d.data.name;const m=17-p.length;return p+(n.length>m?n.substring(0,m-1)+"…":n);});
  full.append("text").attr("class","n-detail").attr("x",6).attr("y",28)
    .style("font-size","8px")
    .text(d=>{const t=detailText(d);return t.length>27?t.substring(0,26)+"…":t;});
  full.filter(d=>d._children).append("text").attr("class","n-expand")
    .attr("x",BOX_W-12).attr("y",22).text(layout==="h"?"▸":"▾");
}

function renderRadial(){
  const maxDepth=d3.max(root.descendants(),d=>d.depth)||1;
  const ringSpacing=90;
  const totalRadius=maxDepth*ringSpacing;
  
  const treeLayout=d3.tree()
    .size([2*Math.PI, totalRadius])
    .separation((a,b)=>((a.parent===b.parent?1:2)/a.depth)||1);
  
  treeLayout(root);
  const nodes=root.descendants(),links=root.links();

  // Ring guides
  g.selectAll(".ring-guide").remove();
  g.selectAll(".ring-label").remove();
  const genLabels=["","Parents","Grandparents","Gr-GP","Gr-Gr-GP","Gr³-GP","Gen 6","Gen 7","Gen 8","Gen 9","Gen 10"];
  for(let i=1;i<=maxDepth;i++){
    g.append("circle").attr("class","ring-guide")
      .attr("cx",0).attr("cy",0).attr("r",i*ringSpacing)
      .attr("fill","none").attr("stroke",ringStroke()).attr("stroke-width",.7);
    if(i<genLabels.length){
      const rlSize=i<=3?8:i<=5?7:6;
      const rlOpacity=i<=3?1:i<=5?.7:.4;
      g.append("text").attr("class","ring-label")
        .attr("x",0).attr("y",-i*ringSpacing).attr("text-anchor","middle").attr("dominant-baseline","central")
        .attr("font-size",rlSize+"px").attr("opacity",rlOpacity)
        .text(genLabels[i]);
    }
  }

  // Radial link generator
  const radialLink=d3.linkRadial().angle(d=>d.x).radius(d=>d.y);

  const link=g.selectAll(".link").data(links,d=>d.target.data.name+d.target.depth);
  const linkE=link.enter().append("path").merge(link);
  linkE.attr("d",radialLink)
    .attr("stroke",d=>R[region(d.target)].link)
    .attr("class",d=>d.target.data.is1912?"link link-dashed":"link")
    .attr("opacity",d=>d.target.data.is1912?.3:.45);
  link.exit().remove();

  // Nodes
  g.selectAll(".node-group").remove();
  const ne=g.selectAll(".node-group").data(nodes).enter().append("g").attr("class","node-group")
    .attr("transform",d=>{
      if(d.depth===0)return"translate(0,0)";
      const angle=d.x-Math.PI/2;
      const x=Math.cos(angle)*d.y;
      const y=Math.sin(angle)*d.y;
      return`translate(${x},${y})`;
    })
    .on("click",toggleNode)
    .on("mouseenter",showTooltip)
    .on("mousemove",e=>{tooltip.style.left=(e.clientX+12)+"px";tooltip.style.top=(e.clientY-8)+"px";})
    .on("mouseleave",()=>tooltip.style.opacity=0);

  // Root node (center circle)
  ne.filter(d=>d.depth===0).append("circle")
    .attr("class","node-box").attr("r",44)
    .attr("fill",R.root.fill).attr("stroke",R.root.stroke).attr("stroke-width",2);
  ne.filter(d=>d.depth===0).append("text")
    .attr("text-anchor","middle").attr("dy","-4")
    .attr("class","n-name-radial").style("font-size","11px").style("font-weight","900")
    .text("BALLYMORE");
  ne.filter(d=>d.depth===0).append("text")
    .attr("text-anchor","middle").attr("dy","12")
    .attr("class","n-name-radial").style("font-size","11px").style("font-weight","900")
    .text("PETE");

  // Non-root nodes: small boxes rotated to face outward
  const nonRoot=ne.filter(d=>d.depth>0);
  const textOnlyDepth=8; // gens 1-7 boxed, 8+ text-only
  
  nonRoot.each(function(d){
    const el=d3.select(this);
    const angleDeg=(d.x*180/Math.PI)-90;
    const flip=d.x>Math.PI;
    const rg=el.append("g").attr("transform",`rotate(${flip?angleDeg+180:angleDeg})`);
    const isTextOnly=d.depth>=textOnlyDepth;
    
    if(isTextOnly){
      const fs=d.depth>=maxDepth?4.5:5.5;
      const textCol=d.data.is1912?"#ccc":d.data.isAus?R.aus.stroke:R.irish.stroke;
      const maxC=Math.floor(70/(fs*0.72));
      const n=d.data.name;
      const display=n.length>maxC?n.substring(0,maxC-1)+"…":n;
      const tw=display.length*fs*0.6+6;
      const tx=flip?-6:6;
      const anchor=flip?"end":"start";
      // White pill behind text
      const rx=flip?tx-tw:tx-2;
      rg.append("rect").attr("x",rx).attr("y",-fs/2-2).attr("width",tw+4).attr("height",fs+4)
        .attr("fill",bgFill()).attr("rx",2).attr("opacity",.9);
      rg.append("text")
        .attr("x",tx).attr("y",2).attr("text-anchor",anchor)
        .attr("font-family","DM Sans").attr("font-weight","500")
        .style("font-size",fs+"px").attr("fill",textCol)
        .text(display);
    } else {
      // Boxed node
      const bw=Math.max(50,Math.min(BOX_W,BOX_W-d.depth*10));
      const bh=d.depth>5?14:d.depth>3?15:26;
      const xOff=flip?-bw-4:4;
      const pad=5;
      const iconSpace=(d._children?8:0);
      const textW=bw-pad*2-iconSpace;
      const fs=d.depth>5?5.5:d.depth>3?6.5:d.depth>1?7.5:8;
      const charW=fs*0.65;
      const detailCharW=(fs-1.5)*0.65;
      const pre=d.data.isAus?"🦘 ":d.data.is1912?"":"🍀 ";
      const maxName=Math.max(3,Math.floor(textW/charW))-pre.length;
      const maxDetail=Math.max(3,Math.floor(textW/detailCharW));
      
      // White halo to mask any link lines passing behind
      rg.append("rect")
        .attr("x",xOff-2).attr("y",-bh/2-2).attr("width",bw+4).attr("height",bh+4)
        .attr("fill",bgFill()).attr("rx",4).attr("ry",4).attr("opacity",.95);
      
      rg.append("rect").attr("class","node-box")
        .attr("x",xOff).attr("y",-bh/2).attr("width",bw).attr("height",bh)
        .attr("fill",R[region(d)].fill).attr("stroke",R[region(d)].stroke);
      
      const anchor=flip?"end":"start";
      const tx=flip?xOff+bw-pad:xOff+pad;
      
      rg.append("text").attr("class","n-name-radial")
        .attr("x",tx).attr("y",d.depth>5?2:d.depth>3?1:-2).attr("text-anchor",anchor)
        .style("font-size",fs+"px")
        .text(()=>{const n=d.data.name;const t=n.length>maxName?n.substring(0,maxName-1)+"…":n;return pre+t;});
      
      if(d.depth<=3){
        rg.append("text").attr("class","n-detail-radial")
          .attr("x",tx).attr("y",10).attr("text-anchor",anchor)
          .style("font-size",(fs-1.5)+"px")
          .text(()=>{const t=detailText(d);return t.length>maxDetail?t.substring(0,maxDetail-1)+"…":t;});
      }
      
      if(d._children){
        const ex=flip?xOff+3:xOff+bw-10;
        rg.append("text").attr("class","n-expand")
          .attr("x",ex).attr("y",2).style("font-size",(fs-1)+"px").text("▸");
      }
    }
  });
}

function update(){
  g.selectAll(".ring-guide,.ring-label").remove();
  if(layout==="r") renderRadial(); else renderTree();
  // Ensure nodes render on top of link lines
  g.selectAll(".node-group").raise();
  if(activeFilter){
    g.selectAll(".node-group").classed("dimmed",d=>region(d)!==activeFilter&&region(d)!=="root");
  }
  updateStats();
  updateTimeline();
}

function setLayout(l){
  layout=l;
  ["h","v","r"].forEach(k=>document.getElementById("btn-"+k).classList.toggle("active",k===l));
  update();setTimeout(resetView,400);
}

function expandAll(){
  root.descendants().forEach(d=>{if(d._children){d.children=d._children;d._children=null;}});
  update();
  setTimeout(()=>{
    const b=g.node().getBBox();
    const s=Math.min(W/(b.width+80),H/(b.height+80),.18);
    svg.transition().duration(500).call(zoomB.transform,d3.zoomIdentity.translate(W/2-(b.x+b.width/2)*s,H/2-(b.y+b.height/2)*s).scale(s));
  },450);
}
function collapseAll(){
  activeFilter=null;
  root.descendants().forEach(d=>{if(d.depth>1&&d.children){d._children=d.children;d.children=null;}});
  update();setTimeout(resetView,350);
}
function resetView(){
  const b=g.node().getBBox();
  const s=Math.min(W/(b.width+100),(H-40)/(b.height+100),1.2);
  svg.transition().duration(500).call(zoomB.transform,d3.zoomIdentity.translate(W/2-(b.x+b.width/2)*s,H/2-(b.y+b.height/2)*s-10).scale(s));
}

update();
setTimeout(resetView,100);
</script>
</body>
